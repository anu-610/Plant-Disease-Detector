<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crop Protector - Multimodal Diagnosis</title>
    <style>
        body { font-family: sans-serif; text-align: center; max-width: 600px; margin: 40px auto; color: #333; }
        h1 { color: #2a5d2a; }
        /* Style for the square drop zone */
        #drop-zone {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 300px;
            height: 300px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            margin: 20px auto;
            cursor: pointer;
            text-align: center;
            color: #aaa;
            font-size: 1.2em;
            overflow: hidden;
        }
        #preview-image { max-width: 100%; max-height: 100%; object-fit: cover; }
        .hidden { display: none; }
        #file-input { display: none; }
        
        /* New styles for text input */
        #text-query {
            width: 90%;
            height: 80px;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1em;
            resize: vertical;
        }
        
        button {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #2a5d2a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        /* Styles for the result box */
        #result {
            margin-top: 20px;
            font-size: 1.1em;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            white-space: pre-wrap; /* Keeps formatting from Gemini (like newlines) */
        }
        #result hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <h1>🌿 Crop Protector 🌿</h1>
    <p>Upload an image OR ask a question about your plant.</p>
    
    <form id="upload-form">
        <!-- Square upload area -->
        <label for="file-input" id="drop-zone">
            <span id="drop-zone-prompt">Click to upload an image</span>
            <img id="preview-image" src="#" alt="Image Preview" class="hidden"/>
        </label>
        <input type="file" name="file" id="file-input" accept="image/*">
        
        <!-- Text Input Area -->
        <textarea id="text-query" name="text_query" placeholder="Or ask a question... e.g., 'My potato plant's leaves are turning yellow and have brown spots. What is it?'"></textarea>
        
        <button type="submit">Diagnose</button>
    </form>
    
    <!-- This div will be filled by JavaScript -->
    <div id="result"></div>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const previewImage = document.getElementById('preview-image');
        const dropZonePrompt = document.getElementById('drop-zone-prompt');
        const textQuery = document.getElementById('text-query');

        // Show image preview when a file is selected
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    previewImage.src = event.target.result;
                    previewImage.classList.remove('hidden');
                    dropZonePrompt.classList.add('hidden'); // Hide the prompt text
                }
                reader.readAsDataURL(file);
            }
        });

        // Form submission logic
        document.getElementById('upload-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Diagnosing... Please wait.';

            // Use FormData to send both file and text
            const formData = new FormData();
            if (fileInput.files.length > 0) {
                formData.append('file', fileInput.files[0]);
            }
            formData.append('text_query', textQuery.value);

            // Send the request to the backend
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            // Handle the structured response
            if (data.error) {
                resultDiv.innerHTML = `<p style="color: red;">Error: ${data.error}</p>`;
            } else {
                let html = '<h3>Agro Vision</h3>';

                // --- NEW LOGIC ---
                // Check if a disease was identified by the vision model
                if (data.disease) {
                    html += `<p><strong>Image Diagnosis:</strong> ${data.disease}</p>`;
                    html += `<p><strong>Confidence:</strong> ${data.confidence}</sstrong></p>`;
                    html += '<hr>'; // Add a separator
                    html += '<h4>Recommended Solution:</h4>';
                }

                // Add the main response from Gemini
                // 'data.solution' will contain the answer to the text query,
                // the solution for the image, or the combined answer.
                html += `<p>${data.solution}</p>`;
                
                resultDiv.innerHTML = html;
            }
        });
    </script>
</body>
</html>
