<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crop Protector - Disease Detection</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            max-width: 600px;
            margin: 40px auto;
            color: #333;
        }
        h1 {
            color: #2a5d2a;
        }
        /* Style for the square drop zone */
        #drop-zone {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 300px;
            height: 300px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            margin: 20px auto;
            cursor: pointer;
            text-align: center;
            color: #aaa;
            font-size: 1.2em;
            transition: border-color 0.3s, background-color 0.3s;
            overflow: hidden; /* Hides parts of the image that don't fit */
        }
        #drop-zone:hover {
            border-color: #2a5d2a;
            background-color: #f9f9f9;
        }
        /* Style for the preview image */
        #preview-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover; /* Ensures the image fills the square nicely */
        }
        .hidden {
            display: none;
        }
        /* Hide the default file input */
        #file-input {
            display: none;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #2a5d2a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #3b803b;
        }
        #result {
            margin-top: 20px;
            font-size: 1.1em;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>🌿 Plant Disease Detector & Diagnoser 🌿</h1>
    <p>Upload an image of a plant leaf to diagnose the disease and get a solution.</p>
    
    <form id="upload-form">
        <label for="file-input" id="drop-zone">
            <span id="drop-zone-prompt">Click to upload image</span>
            <img id="preview-image" src="#" alt="Image Preview" class="hidden"/>
        </label>
        
        <input type="file" name="file" id="file-input" accept="image/*" required>
        
        <button type="submit">Diagnose & Get Solution</button>
    </form>
    
    <div id="result"></div>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const previewImage = document.getElementById('preview-image');
        const dropZonePrompt = document.getElementById('drop-zone-prompt');

        // Show image preview when a file is selected
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    previewImage.src = event.target.result;
                    previewImage.classList.remove('hidden');
                    dropZonePrompt.classList.add('hidden'); // Hide the prompt text
                }
                reader.readAsDataURL(file);
            }
        });

        // Form submission logic
        document.getElementById('upload-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Diagnosing and generating solution... Please wait.';

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.error) {
                resultDiv.innerHTML = `<p style="color: red;">Error: ${data.error}</p>`;
            } else {
                // --- THIS IS THE UPDATED PART ---
                resultDiv.innerHTML = `
                    <h3>Diagnosis Result</h3>
                    <p><strong>Disease:</strong> ${data.disease}</p>
                    <p><strong>Confidence:</strong> ${data.confidence}</p>
                    <hr>
                    <h4>Recommended Solution:</h4>
                    <p>${data.solution}</p>
                `;
                // -----------------------------
            }
        });
    </script>
</body>
</html>
